<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="kodamanoyui の水彩画などの作品を掲載するシンプルな作品ページです。">
    <link rel="canonical" href="https://kodamanoyui.github.io/works/">
    <meta property="og:title" content="kodamanoyui 作品集">
    <meta property="og:description" content="水彩画など、日々の創作を少しずつ載せていきます。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kodamanoyui.github.io/works/">
    <meta property="og:image" content="https://kodamanoyui.github.io/works/assets/nico-tacos.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "kodamanoyui 作品集",
        "url": "https://kodamanoyui.github.io/works/"
      }
    </script>
    <title>kodamanoyui 作品集</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="top-bar">
      <a class="brand" href="https://kodamanoyui.github.io/works/" aria-label="作品集トップへ">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>works</span>
      </a>
      <span class="top-name">kodamanoyui</span>
    </header>

    <main class="page">
      <section class="profile" aria-label="プロフィール">
        <div class="avatar avatar-large" aria-hidden="true">k</div>
        <div class="profile-text">
          <h1>kodamanoyui</h1>
          <dl class="stats" aria-label="作品数">
            <div>
              <dt>1</dt>
              <dd>投稿</dd>
            </div>
          </dl>
          <p>水彩画など、日々の創作を少しずつ載せていきます。</p>
        </div>
      </section>

      <section class="works" aria-label="作品一覧">
        <article class="post">
          <header class="post-header">
            <div class="avatar avatar-small" aria-hidden="true">k</div>
            <div>
              <p class="account">kodamanoyui</p>
              <p class="medium">水彩スケッチ</p>
            </div>
          </header>
          <img src="assets/nico-tacos.jpg" alt="水彩で描かれたニコのタコスセット">
          <footer class="post-footer">
            <div class="post-actions" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <time datetime="2026-05-31">2026年5月31日</time>
          </footer>
        </article>
      </section>
    </main>
  </body>
</html>
